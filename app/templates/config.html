{% extends "base.html" %}

{% block content %}
<div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
        <h2 class="text-2xl font-bold">API Management</h2>
        <div class="text-white/50">Manage your exchange connections and API keys</div>
    </div>
</div>

{% if msg %}
<div class="mt-4 alert {% if success %}alert-success{% else %}alert-danger{% endif %}">
    {{ msg }}
</div>
{% endif %}

<div class="mt-4 card-surface p-4 xl:max-w-2xl">
    <form action="/config" method="post" class="space-y-4">
        <div class="panel-secondary p-3">
            <h3 class="section-title text-sm">Exchange Credentials</h3>
            <div class="mt-3 grid grid-cols-1 gap-3">
                <div>
                    <label class="block text-xs uppercase tracking-wider">Exchange</label>
                    <select name="exchange_name" id="exchange-select" class="mt-1 block w-full input" required>
                        {% for ex in exchanges %}
                        <option value="{{ ex }}">{{ ex|upper }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider">Label</label>
                    <input type="text" name="label" required placeholder="Account label"
                           class="mt-1 block w-full input">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider">API Key</label>
                    <input type="text" name="api_key" required placeholder="API Key"
                           class="mt-1 block w-full input">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider">Secret</label>
                    <div class="relative">
                        <input
                            type="password"
                            name="api_secret"
                            required
                            placeholder="API Secret"
                            class="mt-1 block w-full input pr-12"
                            data-password-input
                        >
                        <button
                            type="button"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-[color:var(--ink-soft)] hover:text-[color:var(--ink)]"
                            data-password-toggle
                            aria-label="Show password"
                            aria-pressed="false"
                        >
                            <svg class="h-5 w-5" data-eye-open fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <svg class="h-5 w-5 hidden" data-eye-closed fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M4 4l16 16" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            Verify & Save
        </button>
    </form>
</div>

<div class="mt-4 panel-secondary p-4">
    <h3 class="text-sm font-semibold uppercase tracking-wider">Connected APIs</h3>
    <div class="mt-3 text-sm font-editorial loading-text" id="config-loading">Loading</div>
    <p class="mt-3 hidden text-sm font-editorial" id="config-empty">No credentials saved.</p>
    <p class="mt-3 hidden text-sm font-editorial text-red-700" id="config-error">Unable to load credentials.</p>
    <div class="mt-3 hidden overflow-x-auto" id="config-table">
        <table class="min-w-full text-xs table-compact">
            <thead>
                <tr>
                    <th class="px-4 py-2 text-left uppercase tracking-wider">Saved At</th>
                    <th class="px-4 py-2 text-left uppercase tracking-wider">Exchange</th>
                    <th class="px-4 py-2 text-left uppercase tracking-wider">Label</th>
                    <th class="px-4 py-2 text-left uppercase tracking-wider">Client ID</th>
                    <th class="px-4 py-2 text-left uppercase tracking-wider">Secret</th>
                    <th class="px-4 py-2"></th>
                </tr>
            </thead>
            <tbody id="config-body"></tbody>
        </table>
    </div>
</div>
<script src="/static/config.js"></script>
{% endblock %}

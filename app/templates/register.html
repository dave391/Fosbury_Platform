{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
    <div class="card-surface p-4 lg:col-span-7">
        <h2 class="text-lg font-semibold uppercase tracking-wider">Account Setup</h2>
        <div class="mt-2 text-sm font-editorial">Create credentials to access your trading console.</div>
    </div>
    <div class="card-surface p-4 lg:col-span-5">
        {% if error %}
        <div class="mb-4 alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form class="space-y-4" action="/register" method="post">
            <div class="space-y-3">
                <div>
                    <label for="email" class="block text-xs uppercase tracking-wider">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        class="mt-1 block w-full input"
                        placeholder="Email address"
                    >
                </div>
                <div>
                    <label for="password" class="block text-xs uppercase tracking-wider">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        class="mt-1 block w-full input"
                        placeholder="Password"
                    >
                </div>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-full"
            >
                Sign Up
            </button>

            <div class="text-xs uppercase tracking-wider">
                <a href="/login" class="underline">Already have an account? Log in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

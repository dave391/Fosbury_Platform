{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
    <div class="border-2 border-black panel-accent p-4 lg:col-span-7">
        <h2 class="text-lg font-semibold uppercase tracking-wider">Account Setup</h2>
        <div class="mt-2 text-sm font-editorial">Create credentials to access your trading console.</div>
    </div>
    <div class="border-2 border-black p-4 lg:col-span-5">
        {% if error %}
        <div class="mb-4 border-2 border-black bg-red-100 p-3 text-xs uppercase tracking-wider text-red-900">
            {{ error }}
        </div>
        {% endif %}

        <form class="space-y-4" action="/register" method="post">
            <div class="space-y-3">
                <div>
                    <label for="email" class="block text-xs uppercase tracking-wider">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        class="mt-1 block w-full border-2 border-black bg-transparent px-2 py-1 text-sm focus:outline-none"
                        placeholder="Email address"
                    >
                </div>
                <div>
                    <label for="password" class="block text-xs uppercase tracking-wider">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        class="mt-1 block w-full border-2 border-black bg-transparent px-2 py-1 text-sm focus:outline-none"
                        placeholder="Password"
                    >
                </div>
            </div>

            <button
                type="submit"
                class="btn-primary w-full border-2 border-black bg-transparent px-3 py-2 text-xs font-semibold uppercase tracking-wider hover:bg-black hover:text-[#F5F5F0]"
            >
                [ Sign Up ]
            </button>

            <div class="text-xs uppercase tracking-wider">
                <a href="/login" class="underline">Already have an account? Log in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

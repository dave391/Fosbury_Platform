{% macro sidebar(active) %}
<div class="mobile-nav md:hidden">
    <input type="checkbox" id="mobile-menu-toggle" class="mobile-toggle-input">
    <div class="mobile-topbar">
        <span class="mobile-brand">
            <img src="/static/logo_dark.png" alt="Fosbury Platform" class="mobile-logo">
            <span class="mobile-title">FOSBURY PLATFORM</span>
        </span>
        <label for="mobile-menu-toggle" class="mobile-toggle">
            <span class="mobile-menu-label">Menu</span>
            <span class="mobile-burger" aria-hidden="true">
                <span class="mobile-burger-line"></span>
                <span class="mobile-burger-line"></span>
                <span class="mobile-burger-line"></span>
            </span>
        </label>
    </div>
    <div class="mobile-menu-panel">
        {{ sidebar_links(active) }}
    </div>
</div>
<aside class="sidebar hidden md:block">
    <div class="sidebar-title">
        <img src="/static/logo_dark.png" alt="Fosbury Platform" class="sidebar-logo">
        <div class="sidebar-brand">FOSBURY PLATFORM</div>
    </div>
    {{ sidebar_links(active) }}
</aside>
{% endmacro %}
